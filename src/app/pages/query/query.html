    <ngx-spinner name="query" type="ball-clip-rotate" size="medium" color="#8b5cf6"></ngx-spinner>

    <div class="page">
      <div class="header-row">
        <div>
          <h1><i class="fas fa-robot"></i> Assistant IA</h1>
          <p class="subtitle">Posez des questions sur vos factures et mouvements bancaires</p>
        </div>
        <div class="header-svg">
          <svg id="svg-query-brain" viewBox="0 0 200 200" fill="none" stroke="#6366f1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M60,50 C40,50 25,65 28,85 C20,90 18,108 30,118 C28,135 40,150 60,148 C70,158 90,160 100,152 C110,160 130,158 140,148 C160,150 172,135 170,118 C182,108 180,90 172,85 C175,65 160,50 140,50 C130,42 110,40 100,48 C90,40 70,42 60,50 Z"/>
            <path d="M100,48 C100,60 98,80 100,100 C102,120 100,140 100,152" stroke-dasharray="5,5"/>
            <path d="M45,75 C55,70 65,78 60,85"/><path d="M35,100 C48,95 58,102 50,110"/><path d="M50,125 C60,120 72,128 65,135"/>
            <path d="M155,75 C145,70 135,78 140,85"/><path d="M165,100 C152,95 142,102 150,110"/><path d="M150,125 C140,120 128,128 135,135"/>
            <circle cx="70" cy="80" r="4" fill="#6366f1" opacity="0.5"/><circle cx="130" cy="80" r="4" fill="#6366f1" opacity="0.5"/>
            <circle cx="55" cy="108" r="4" fill="#6366f1" opacity="0.5"/><circle cx="145" cy="108" r="4" fill="#6366f1" opacity="0.5"/>
            <path d="M160,35 L165,25 L170,35 L180,38 L170,42 L165,52 L160,42 L150,38 Z" stroke-width="2"/>
            <line x1="80" y1="170" x2="80" y2="185" stroke-width="2"/><line x1="100" y1="168" x2="100" y2="185" stroke-width="2"/><line x1="120" y1="170" x2="120" y2="185" stroke-width="2"/>
            <line x1="70" y1="185" x2="130" y2="185" stroke-width="2"/>
          </svg>
        </div>
      </div>

      <div class="query-box">
        <textarea [(ngModel)]="queryText" placeholder="Ex: Quelles factures correspondent à la sortie de 1500€ du 15 mars ?"
                  rows="3" (keydown.control.enter)="ask()"></textarea>
        <button class="btn-ask" (click)="ask()" [disabled]="loading() || !queryText.trim()">
          {{ loading() ? 'Réflexion en cours...' : 'Demander' }}
        </button>
      </div>

      <div class="history">
        @for (item of history(); track $index) {
          <div class="chat-item">
            <div class="question">
              <span class="avatar user">👤</span>
              <p>{{ item.question }}</p>
            </div>
            <div class="answer">
              <span class="avatar ai">🤖</span>
              <div>
                <p>{{ item.answer }}</p>
                @if (item.sources.length) {
                  <div class="sources">
                    <strong>Sources:</strong>
                    @for (s of item.sources; track s) {
                      <span class="source-tag">{{ s | slice:0:8 }}...</span>
                    }
                  </div>
                }
              </div>
            </div>
          </div>
        }
      </div>
    </div>
